<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu Tienda - Chago Pizzería</title>
        <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="estilosubicacion.css">
    <link rel="stylesheet" href="estilosdomicilio.css">
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar-minimal">
        <div class="nav-container">
            <img src="logo.jpeg" alt="Chago Logo" class="nav-logo">
            <a href="index.html" class="nav-minimal-link">INICIO</a>
            <a href="menu.html" class="nav-minimal-link">MENÚ</a>
            <a href="promos.html" class="nav-minimal-link">PROMOS</a>
            <a href="ubicacion.html" class="nav-minimal-link">UBICACIÓN</a>
        </div>
    </header>

    <main class="container-domicilio">
        <h1 class="titulo-domicilio">INGRESA TU DIRECCIÓN DE ENTREGA</h1>
        <p class="subtitulo-domicilio">Confirma tu ubicación en el mapa para disfrutar de la mejor pizza.</p>

        <div class="domicilio-grid">
            <!-- Sección Mapa -->
            <section class="mapa-container">
                <!-- Mapa de Chilpancingo como ejemplo -->
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3875.1861294738565!2d-99.50608058504196!3d17.541732788145654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85f45a475b1c1a7d%3A0x2e22f9a3f3c5e0cf!2sChilpancingo%2C%20Guerrero%2C%20M%C3%A9xico!5e0!3m2!1ses!2smx!4v1715361351234"
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </section>

            <!-- Sección Formulario -->
            <section class="form-domicilio">
                <label for="localidad">LOCALIDAD</label>
                <input type="text" id="localidad" placeholder="Ej. Chilpancingo">

                <label for="ubicacion">CALLE Y NÚMERO</label>
                <input type="text" id="ubicacion" placeholder="Ej. Av. Insurgentes #45">
                
                <label for="colonia">COLONIA / FRACCIONAMIENTO</label>
                <input type="text" id="colonia" placeholder="Ej. Centro">

                <label for="referencias">REFERENCIAS (Color de casa, negocios cerca)</label>
                <textarea id="referencias" rows="3" placeholder="Casa portón blanco frente a la tienda..."></textarea>
                
                <button type="button" class="btn-domicilio">
                    COMPLETAR DIRECCIÓN
                </button>

                <div class="domicilio-info">
                    <p>📍 <strong>Zona de cobertura:</strong> Chilpancingo y áreas cercanas.</p>
                    <p>🕒 <strong>Tiempo estimado:</strong> 30 - 45 min.</p>
                </div>
            </section>
        </div>
    </main>
    <footer class="chago-footer">
        <div class="container footer-content">
            <div class="footer-section">
                <img src="logo.jpeg" alt="Logo" class="logo-img">
                <p>Sabor artesanal a la leña.</p>
            </div>
            <div class="footer-section">
                <h4>SÍGUENOS</h4>
                <div class="footer-social-links">
                    <a href="https://wa.me/+527451176090" target="_blank">WhatsApp</a>
                    <a href="https://www.facebook.com/share/1GHT45mneg/" target="_blank">Facebook</a>
                    <a href="https://www.instagram.com/pizzas_chago" target="_blank">Instagram</a>
                    <a href="https://www.tiktok.com/@pizzas.chago" target="_blank">TikTok</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
