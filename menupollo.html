<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollo - Chago Pizzería</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="estilospizzas.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar-minimal">
        <div class="nav-container">
            <img src="logo.jpeg" alt="Chago Logo" class="nav-logo">
            <a href="index.html" class="nav-minimal-link">INICIO</a>
            <a href="menu.html" class="nav-minimal-link">MENÚ</a>
            <a href="promos.html" class="nav-minimal-link">PROMOS</a>
            <a href="ubicacion.html" class="nav-minimal-link">UBICACIÓN</a>
            <a href="#" class="cart-link">
                <img src="carritodecompras.png" alt="Carrito" width="35">
                <span class="cart-count">0</span>
            </a>
        </div>
    </header>

    <main>
        <div class="container" style="padding: 10px 0;">
            <a href="menu.html" class="btn-regresar-menu">← Volver al Menú</a>
        </div>

        <div class="grid-pizzas-main">
            <div class="pizzas-header-bar">
                <span>POLLO Y COMPLEMENTOS</span>
                <span style="font-size: 0.7rem; font-family: 'Montserrat';">ALITAS Y MÁS</span>
            </div>

            <div class="pizzas-grid">
                <article class="pizza-item-card">
                    <div class="pizza-image-container">
                        <img src="alitasadobadas.jpg" alt="Alitas Adobadas">
                    </div>
                    <select class="pizza-tamano-select">
                        <option>Orden 6 pzas - $85</option>
                        <option>Orden 12 pzas - $160</option>
                    </select>
                    <button class="btn-ordenar-ahora">ORDENAR AHORA</button>
                    <h3>ALITAS ADOBADAS</h3>
                </article>

                <article class="pizza-item-card">
                    <div class="pizza-image-container">
                        <img src="alitasbbq.jpg" alt="Alitas BBQ">
                    </div>
                    <select class="pizza-tamano-select">
                        <option>Orden 6 pzas - $85</option>
                        <option>Orden 12 pzas - $160</option>
                    </select>
                    <button class="btn-ordenar-ahora">ORDENAR AHORA</button>
                    <h3>ALITAS BBQ</h3>
                </article>

                <article class="pizza-item-card">
                    <div class="pizza-image-container">
                        <img src="alitasmangohabanero.jpg" alt="Alitas Mango Habanero">
                    </div>
                    <select class="pizza-tamano-select">
                        <option>Orden 6 pzas - $90</option>
                        <option>Orden 12 pzas - $170</option>
                    </select>
                    <button class="btn-ordenar-ahora">ORDENAR AHORA</button>
                    <h3>MANGO HABANERO</h3>
                </article>

                <article class="pizza-item-card">
                    <div class="pizza-image-container">
                        <img src="alitasnaturalez.jpg" alt="Alitas Naturales">
                    </div>
                    <select class="pizza-tamano-select">
                        <option>Orden 6 pzas - $80</option>
                        <option>Orden 12 pzas - $150</option>
                    </select>
                    <button class="btn-ordenar-ahora">ORDENAR AHORA</button>
                    <h3>ALITAS NATURALES</h3>
                </article>

                <article class="pizza-item-card">
                    <div class="pizza-image-container">
                        <img src="nuggets.jpg" alt="Nuggets">
                    </div>
                    <select class="pizza-tamano-select">
                        <option>Orden 6 pzas - $65</option>
                        <option>Orden 10 pzas - $95</option>
                    </select>
                    <button class="btn-ordenar-ahora">ORDENAR AHORA</button>
                    <h3>NUGGETS DE POLLO</h3>
                </article>
            </div>
        </div>
    </main>
    <footer class="chago-footer">
        <div class="container footer-content">
            <div class="footer-section">
                <img src="logo.jpeg" alt="Logo" class="logo-img">
                <p>Sabor artesanal a la leña.</p>
            </div>
            <div class="footer-section">
                <h4>SÍGUENOS</h4>
                <div class="footer-social-links">
                    <a href="https://wa.me/+527451176090" target="_blank">WhatsApp</a>
                    <a href="https://www.facebook.com/share/1GHT45mneg/" target="_blank">Facebook</a>
                    <a href="https://www.instagram.com/pizzas_chago" target="_blank">Instagram</a>
                    <a href="https://www.tiktok.com/@pizzas.chago" target="_blank">TikTok</a>
                </div>
            </div>
        </div>
    </footer>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Tu Pedido en Chago</h2>
            <hr>
            <div id="lista-carrito">
                <p>El carrito está vacío 🍕</p>
            </div>
            <div class="total-carrito" style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px;">
                <strong>Total: $<span id="precio-total">0</span></strong>
            </div>
            <button id="btn-comprar" class="btn-confirmar">Confirmar Pedido</button>
        </div>
    </div>

    <script src="scripcarrito.js"></script>
</body>
</html>
